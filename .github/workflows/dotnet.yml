name: .NET CI Pipeline Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # Removing arguments forces .NET to handle project discovery internally, bypassing Bash entirely
    - name: Restore Application Dependencies
      run: dotnet restore

    # Compiles the discovered projects while ignoring the broken relative paths in the solution file
    - name: Build Application Project
      run: dotnet build --configuration Release --no-restore