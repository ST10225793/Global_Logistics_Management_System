name: .NET CI Pipeline Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # Direct target paths using forward-slashes for seamless cross-platform compatibility
    - name: Restore Project Dependencies
      run: dotnet restore "Global Logistics Management System/Global Logistics Management System.sln"

    - name: Build Solution
      run: dotnet build "Global Logistics Management System/Global Logistics Management System.sln" --configuration Release --no-restore