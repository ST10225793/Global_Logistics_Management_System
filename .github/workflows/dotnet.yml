name: .NET CI Pipeline Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # Sets the execution context directly inside the target directory to bypass space bugs
    - name: Restore Application Dependencies
      working-directory: ./Global Logistics Management System
      run: dotnet restore

    - name: Build Application Project
      working-directory: ./Global Logistics Management System
      run: dotnet build --configuration Release --no-restore --no-dependencies