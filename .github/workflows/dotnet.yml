name: .NET CI Pipeline Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # Recursively searches all directories and subfolders to find and restore all project files
    - name: Restore Project Dependencies
      run: |
        dotnet restore $(find . -name "*.sln" | head -n 1)

    # Compiles the nested solution structure cleanly in Release mode
    - name: Build Solution
      run: |
        dotnet build $(find . -name "*.sln" | head -n 1) --configuration Release --no-restore