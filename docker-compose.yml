services:
  # ----------------------------------------------------
  # Container 1: sql-server-db
  # ----------------------------------------------------
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  # ----------------------------------------------------
  # Container 2: web-api-backend
  # ----------------------------------------------------
  web-api-backend:
    image: web-api-backend
    container_name: web-api-backend
    build:
      context: ..
      dockerfile: Global Logistics Management System API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sql-server-db;Database=GLMS_Database;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;
    ports:
      - "5001:8080"
    depends_on:
      - sql-server-db

  # ----------------------------------------------------
  # Container 3: mvc-frontend
  # ----------------------------------------------------
  mvc-frontend:
    image: mvc-frontend
    container_name: mvc-frontend
    build:
      context: ..
      dockerfile: Global Logistics Management System/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"
    depends_on:
      - web-api-backend
      - sql-server-db

volumes:
  mssql_data: